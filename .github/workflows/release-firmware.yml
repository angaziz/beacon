# Firmware releases: push a tag like firmware-v0.1.0 and this ships
#   - beacon-v<ver>-full.bin   (full-flash image @0x0 for the web flasher / esptool)
#   - beacon-v<ver>-app.bin    (app-only image @0x10000 for OTA-style updates)
# and redeploys the GitHub Pages web flasher with the new image.
name: Release firmware

on:
  push:
    tags: ["firmware-v*"]

jobs:
  firmware:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # esptool pinned <5: v5 renamed merge_bin; pyyaml: pioarduino builder imports it
      - run: pip install platformio pyyaml "esptool~=4.8"
      - name: Build
        working-directory: firmware
        env:
          FIRMWARE_VERSION: ${{ github.ref_name }}   # e.g. v0.1.0; baked into the About panel
        run: pio run -e beacon
      - name: Assemble flashable images
        working-directory: firmware
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#firmware-}"   # firmware-v0.1.0 => v0.1.0
          BUILD=.pio/build/beacon
          # boot_app0 selects ota_0 on first boot; shipped with the arduino-esp32 framework
          BOOT_APP0=$(ls "$HOME"/.platformio/packages/framework-arduinoespressif32*/tools/partitions/boot_app0.bin | head -1)
          mkdir -p out
          # Offsets are the standard ESP32-S3 Arduino layout (bootloader@0x0) + partitions.csv
          esptool.py --chip esp32s3 merge_bin -o "out/beacon-${VERSION}-full.bin" \
            --flash_mode keep --flash_freq keep --flash_size 16MB \
            0x0     "$BUILD/bootloader.bin" \
            0x8000  "$BUILD/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$BUILD/firmware.bin"
          cp "$BUILD/firmware.bin" "out/beacon-${VERSION}-app.bin"
      - uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: firmware/out/*

  release:
    name: Publish GitHub release
    needs: [firmware]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: firmware
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  flasher:
    name: Deploy web flasher
    needs: [firmware]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: firmware
          path: site/firmware
      - name: Assemble Pages site
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#firmware-}"
          cp firmware/flasher.html site/index.html
          rm -f site/firmware/*-app.bin   # the flasher only serves the full image
          FULL=$(basename site/firmware/beacon-*-full.bin)
          cat > site/manifest.json <<EOF
          {
            "name": "Beacon",
            "version": "${VERSION}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [{ "path": "firmware/${FULL}", "offset": 0 }]
              }
            ]
          }
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
