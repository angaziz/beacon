[env:beacon]
; pioarduino is the only platform shipping Arduino-ESP32 core 3.3.x (tech.md §5).
; 55.03.35 == Arduino v3.3.5 / ESP-IDF v5.5.1. Verified at boot (main.cpp logs the core version).
; PIN RATIONALE: core 3.3.6+ changed spiFrequencyToClockDiv() to a 2-arg signature, which
; GFX_Library_for_Arduino 1.6.4/1.6.5 do not yet handle (their SPI databus files fail to compile).
; 3.3.5 is the LAST 3.3.x with the 1-arg signature => newest core that keeps the tech.md §5
; GFX 1.6.4 pin compiling clean. Do not bump past 55.03.35 until GFX gains 2-arg support.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi   ; OPI PSRAM
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
test_ignore = *   ; [env:beacon] runs no host unit tests; on-device checks use `pio run -t upload`
extra_scripts = pre:version.py   ; injects -DFIRMWARE_VERSION (git tag in CI, else "dev")

build_flags =
  -DBOARD_HAS_PSRAM
  -DBEACON_LVGL_PSRAM      ; P2: BLE stack + WiFi + TLS need the internal SRAM; keep LVGL draw buffers in PSRAM (heap re-measure: min int_free ~44KB without this => TLS fetches time out). tech.md §8.
  -DBEACON_DEV=0            ; 0 = real device-direct data layer (P1); set 1 for the dev seeder + state-driver harness
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE   ; generated font C files then use #include "lvgl.h" (resolves via lib)
  -I src
  ; NOTE: do NOT add -DLV_CONF_PATH — LVGL 8.4 double-stringifies it and the include breaks.
  ; LV_CONF_INCLUDE_SIMPLE makes LVGL do #include "lv_conf.h", found via -I src.

lib_deps =
  lvgl/lvgl@8.4.0
  moononournation/GFX Library for Arduino@1.6.4
  lewisxhe/XPowersLib@0.2.6
  lewisxhe/SensorLib@0.3.3
  bblanchon/ArduinoJson@^7.2.0

[env:capture]
; Screenshot build: identical to env:beacon but with the flush-tap capture harness and the dev seeder
; (deterministic, always-populated screens). Flash this, then run tools/capture/grab.py to pull a
; glare-free PNG of every theme x screen straight from the panel framebuffer. NOT for production.
extends = env:beacon
build_unflags = -DBEACON_DEV=0      ; drop the inherited real-data flag before forcing the seeder on
build_flags =
  ${env:beacon.build_flags}
  -DBEACON_CAPTURE=1
  -DBEACON_DEV=1           ; populate screens with seeded data so the catalog isn't empty/LOADING

[env:native]
; Host-only env for pure-logic unit tests (records / screen_state / datastore /
; config validation / theme catalog). NO Arduino, NO LVGL — kept out of native
; translation units via -DBEACON_NATIVE. Does not affect [env:beacon] above.
platform = native
test_framework = unity
test_build_src = yes   ; compile project src/ (filtered below) into test binaries, not just test/ files
lib_deps =
  bblanchon/ArduinoJson@^7.2.0   ; header-only; the pure parse TUs deserialize on the host too
; runs every test/test_<unit>/ folder (each is its own program with its own main()).
build_flags =
  -DBEACON_NATIVE=1        ; guards Arduino/LVGL-coupled code out of host builds
  -DUNITY_INCLUDE_DOUBLE   ; finance/change-basis asserts compare doubles
  -I src
  ; do NOT add -std=gnu++17 here: build_flags also hit Unity's C sources and clang
  ; rejects a C++ standard on .c files. Apple clang defaults to C++17 for .cpp (std::mutex OK).
; Arduino/LVGL-free TUs the host tests link: datastore + the pure parse/tz/change-basis logic.
build_src_filter = -<*> +<core/datastore.cpp> +<core/tz_map.cpp> +<core/change_basis.cpp>
  +<core/wifi_list.cpp> +<core/hub_proto.cpp> +<core/hub_report.cpp> +<fetch/parse_weather.cpp> +<fetch/parse_finance.cpp> +<fetch/parse_geoip.cpp> +<core/idle.cpp> +<core/imu_detect.cpp> +<core/about_format.cpp> +<config/ticker_table.cpp> +<config/ticker_store.cpp> +<core/timekeep_cal.cpp>
